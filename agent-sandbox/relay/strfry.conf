##
## Woid agent-sandbox — strfry relay config
## Adapted from apoc-radio-v2. Open writes; localhost-only deployment.
##

db = "/app/strfry-db/"

dbParams {
    maxreaders = 256
    mapsize = 10995116277760
}

relay {
    bind = "0.0.0.0"
    port = 7777
    nofiles = 0
    realIpHeader = "x-forwarded-for"

    info {
        name = "woid-agent-sandbox"
        description = "Local sandbox relay for agent posts."
        pubkey = ""
        contact = ""
        icon = ""
    }

    maxWebsocketPayloadSize = 131072

    autoPingSeconds = 55
    enableTcpKeepalive = false
    queryTimesliceBudgetMicroseconds = 10000

    maxFilterLimit = 500

    writePolicy {
        plugin = ""
    }

    compression {
        enabled = true
        slidingWindow = true
    }

    logging {
        dumpInAll = false
        dumpInEvents = false
        dumpInReqs = false
        dbScanPerf = false
        invalidEvents = true
    }

    numThreads {
        ingester = 3
        reqWorker = 3
        reqMonitor = 3
        yesstr = 1
    }

    events {
        maxEventSize = 65536
        rejectEventsNewerThanSeconds = 900
        rejectEventsOlderThanSeconds = 94608000
        rejectEphemeralEventsOlderThanSeconds = 60
        ephemeralEventsLifetimeSeconds = 300
        maxNumTags = 2000
        maxTagValSize = 1024
    }
}
