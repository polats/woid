name: woid-agent-sandbox

services:
  relay:
    build: ./relay
    ports:
      - "17777:7777"
    volumes:
      - relay-db:/app/strfry-db
    restart: unless-stopped

  room-server:
    build: ./room-server
    ports:
      - "12567:2567"
    environment:
      PORT: "2567"
    volumes:
      - ./room-server/src:/app/src
    command: ["npm", "run", "dev"]
    restart: unless-stopped

  pi-bridge:
    build: ./pi-bridge
    ports:
      - "13457:3457"
    environment:
      PORT: "3457"
      # LAN-reachable URL the bridge stamps into avatar / post-image
      # URLs so phones on the network can load them. Override via env
      # if your LAN IP changes.
      PUBLIC_BRIDGE_URL: "${PUBLIC_BRIDGE_URL:-http://10.0.0.36:13457}"
      RELAY_URL: "ws://relay:7777"
      ROOM_SERVER_URL: "ws://room-server:2567"
      WORKSPACE: "/workspace"
      NVIDIA_NIM_API_KEY: "${NVIDIA_NIM_API_KEY}"
      GEMINI_API_KEY: "${GEMINI_API_KEY}"
      # Self-hosted FLUX.1-Kontext-dev URL (image editing). Powers the
      # Assets tab T-pose generator. Leave blank to disable that feature.
      FLUX_KONTEXT_URL: "${FLUX_KONTEXT_URL:-}"
      # Self-hosted Microsoft TRELLIS image-to-3D on Cloud Run. Powers
      # the Assets tab 3D model generator. Leave blank to disable.
      TRELLIS_URL: "${TRELLIS_URL:-}"
      # Self-hosted Tencent Hunyuan3D-2 image-to-3D on Cloud Run.
      # Alternate mesh backend for the Assets tab — selectable via
      # body.backend on /generate-model/stream. See API docs at
      # ../google-cloud/gemma-4-self-hosted/hunyuan3d/API.md.
      HUNYUAN3D_URL: "${HUNYUAN3D_URL:-}"
      # Optional. Point at an OpenAI-compat llama.cpp/vLLM/Ollama server
      # to expose a `local` provider in the sandbox. See
      # agent-sandbox/llama-cpp/ for a turnkey llama.cpp stack.
      # From inside docker-compose, host.docker.internal resolves to the
      # host; from the host, use http://localhost:18080/v1.
      LOCAL_LLM_BASE_URL: "${LOCAL_LLM_BASE_URL:-}"
      # Optional S3 store for avatar bytes. Leave all five blank for
      # the filesystem-only dev workflow; set to a Railway bucket /
      # MinIO / other S3-compat when testing that code path locally.
      # pi-bridge treats "any unset" as "S3 disabled" and falls back
      # to the pi-workspace volume mount for everything.
      S3_ENDPOINT: "${S3_ENDPOINT:-}"
      S3_BUCKET: "${S3_BUCKET:-}"
      S3_REGION: "${S3_REGION:-}"
      S3_ACCESS_KEY: "${S3_ACCESS_KEY:-}"
      S3_SECRET_KEY: "${S3_SECRET_KEY:-}"
      # ExternalHarness HMAC secret — required to spawn agents with
      # harness: "external". Generate once: openssl rand -hex 32.
      AGENT_TOKEN_SECRET: "${AGENT_TOKEN_SECRET:-}"
      # Public Jumble URL (host-reachable). Used to build profile links
      # in persona-API responses and the generation log. Match the host
      # port mapped by the `jumble` service below.
      PUBLIC_JUMBLE_URL: "${PUBLIC_JUMBLE_URL:-http://localhost:18089}"
    volumes:
      - pi-workspace:/workspace
      # Bind-mount source so edits hot-reload via `node --watch`. The
      # anonymous volume on node_modules keeps the image's installed
      # deps intact (host has no node_modules in this dir).
      - ./pi-bridge:/app/bridge
      - /app/bridge/node_modules
    command: ["npm", "run", "dev"]
    # Let the bridge reach a llama.cpp server running on the host via
    # host.docker.internal:18080 (set LOCAL_LLM_BASE_URL accordingly).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - relay
      - room-server
    restart: unless-stopped

  # Rig-finalisation worker (steps 6-8 of the asset pipeline).
  # Wraps unirig_mapping.py + glb_palms_down.py + import_unirig_glb.py
  # behind one HTTP endpoint, called by pi-bridge after UniRig.
  # See docs/design/asset-pipeline-rig-import.md.
  kimodo-tools:
    build: ./kimodo-tools
    ports:
      - "8082:8082"
    environment:
      WORKSPACE: "/workspace"
      KIMODO_DIR: "/kimodo"
      WOID_SCRIPTS: "/woid-scripts"
    volumes:
      # Same character workspace as pi-bridge — read rig.glb and write
      # rig_palmsdown.glb in place, no byte-shuffling between containers.
      - pi-workspace:/workspace
      # Host bind-mounts for the kimodo + woid checkouts. Override
      # KIMODO_HOST_DIR / WOID_HOST_DIR if your repos live elsewhere.
      - "${KIMODO_HOST_DIR:-${HOME}/projects/kimodo}:/kimodo"
      - "${WOID_HOST_DIR:-${HOME}/projects/woid}/scripts:/woid-scripts:ro"
    restart: unless-stopped

  jumble:
    build:
      context: .
      dockerfile: jumble.Dockerfile
      args:
        VITE_COMMUNITY_RELAYS: "ws://localhost:17777/"
        VITE_COMMUNITY_RELAY_SETS: '[{"id":"woid-sandbox","name":"Woid Sandbox","relayUrls":["ws://localhost:17777/"]}]'
    ports:
      - "18089:80"
    restart: unless-stopped

volumes:
  relay-db:
  pi-workspace:
