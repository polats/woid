name: woid-llama-cpp

# Optional llama.cpp server for woid-sandbox's `local` provider.
# Runs standalone — not part of agent-sandbox/docker-compose.yml — because
# only some operators have a GPU. If you do:
#
#   1. ./scripts/install-nvidia-container-toolkit.sh   # one-time, sudo
#   2. ./scripts/swap-local-model.sh gemma-4-E4B-it-Q4_K_M
#   3. docker compose --env-file .env.llama-cpp -f docker-compose.yml up -d
#   4. set LOCAL_LLM_BASE_URL=http://host.docker.internal:18080/v1
#      in agent-sandbox/.env, restart pi-bridge
#
# For CPU-only, swap the image to :server and remove the deploy.resources
# block below. Expect 5-30 tok/s vs ~130 tok/s on a 3090.

services:
  llama-cpp:
    image: ${LLAMA_CPP_IMAGE:-ghcr.io/ggml-org/llama.cpp:server-cuda}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      # Bind to all host interfaces so containers on other user-defined
      # bridge networks (notably agent-sandbox's pi-bridge) can reach us
      # via their docker bridge gateway IP. 127.0.0.1-only binding would
      # isolate us to host loopback.
      - "18080:8080"
    volumes:
      - hf-cache:/root/.cache/huggingface
    environment:
      HF_TOKEN: "${HF_TOKEN:-}"
    # llama-server downloads the GGUF from HF on first boot into the
    # hf-cache volume; subsequent boots are instant. `-ngl 99` offloads
    # every layer to the GPU when running the CUDA image.
    command: >
      --host 0.0.0.0
      --port 8080
      --jinja
      --parallel ${LLAMA_CPP_PARALLEL:-1}
      -ngl ${LLAMA_CPP_NGL:-99}
      -hf ${LLAMA_CPP_HF_REPO}:${LLAMA_CPP_QUANT}
      ${LLAMA_CPP_EXTRA_ARGS:---ctx-size 16384}
    restart: unless-stopped

volumes:
  hf-cache:
