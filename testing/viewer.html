<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Woid — E2E Session Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; }

  .header { padding: 20px 24px; border-bottom: 1px solid #1a1a1a; display: flex; align-items: center; gap: 16px; }
  .header h1 { font-size: 18px; font-weight: 700; }
  .header .subtitle { font-size: 12px; color: #666; }
  .header .refresh { background: #1a1a1a; border: 1px solid #333; color: #888; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; }
  .header .refresh:hover { background: #222; color: #fff; }

  .container { display: flex; height: calc(100vh - 60px); }

  .sidebar { width: 280px; border-right: 1px solid #1a1a1a; overflow-y: auto; flex-shrink: 0; }
  .session-item { padding: 12px 16px; border-bottom: 1px solid #111; cursor: pointer; transition: background 0.1s; }
  .session-item:hover { background: #111; }
  .session-item.active { background: #1a1a2e; border-left: 3px solid #6366f1; }
  .session-item .name { font-size: 13px; font-weight: 600; color: #ccc; }
  .session-item .meta { font-size: 11px; color: #555; margin-top: 3px; }
  .session-item .badge { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 3px; font-weight: 600; }
  .badge-pass { background: #22c55e20; color: #22c55e; }
  .badge-fail { background: #ef444420; color: #ef4444; }

  .main { flex: 1; overflow-y: auto; padding: 24px; }
  .main h2 { font-size: 16px; margin-bottom: 16px; }

  .test-card { background: #111; border: 1px solid #1a1a1a; border-radius: 10px; margin-bottom: 16px; overflow: hidden; }
  .test-card-header { padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #1a1a1a; }
  .test-card-header .title { font-size: 13px; font-weight: 600; }
  .test-card-header .duration { font-size: 11px; color: #666; font-family: monospace; }

  .video-container { background: #000; padding: 8px; }
  .video-container video { width: 100%; border-radius: 6px; max-height: 400px; }
  .no-video { padding: 20px; text-align: center; color: #333; font-size: 12px; }

  .error-box { margin: 8px 12px 12px; padding: 10px; background: #1a0808; border: 1px solid #ef444430; border-radius: 6px; }
  .error-box pre { font-size: 11px; color: #ef4444; white-space: pre-wrap; font-family: monospace; }

  .empty { text-align: center; padding: 60px 20px; color: #333; }
  .empty h2 { font-size: 16px; margin-bottom: 8px; color: #555; }
  .empty p { font-size: 13px; }
  .empty code { background: #1a1a1a; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
</style>
</head>
<body>

<div class="header">
  <h1>Woid — E2E Sessions</h1>
  <span class="subtitle">playwright run history</span>
  <span style="flex:1"></span>
  <button class="refresh" onclick="loadSessions()">↻ Refresh</button>
</div>

<div class="container">
  <div class="sidebar" id="sidebar"></div>
  <div class="main" id="main">
    <div class="empty">
      <h2>No session selected</h2>
      <p>Run tests to generate sessions:</p>
      <p style="margin-top:8px;"><code>npm run test:e2e</code></p>
    </div>
  </div>
</div>

<script>
let sessions = [];
let currentSession = null;

async function loadSessions() {
  try {
    const res = await fetch('sessions/manifest.json');
    sessions = await res.json();
  } catch {
    sessions = [];
  }
  renderSidebar();
  if (sessions.length > 0 && !currentSession) {
    selectSession(sessions[0].name);
  }
}

function renderSidebar() {
  const el = document.getElementById('sidebar');
  if (sessions.length === 0) {
    el.innerHTML = '<div class="empty" style="padding:30px 16px;"><p style="font-size:12px;color:#444;">No sessions yet.<br>Run <code>npm run test:e2e</code></p></div>';
    return;
  }
  el.innerHTML = sessions.map(s => `
    <div class="session-item ${currentSession === s.name ? 'active' : ''}" onclick="selectSession('${s.name}')">
      <div class="name">
        <span class="badge ${s.pass ? 'badge-pass' : 'badge-fail'}">${s.pass ? 'PASS' : 'FAIL'}</span>
        ${s.name}
      </div>
      <div class="meta">${s.testCount} tests · ${(s.duration / 1000).toFixed(1)}s · ${new Date(s.date).toLocaleTimeString()}</div>
    </div>
  `).join('');
}

async function selectSession(name) {
  currentSession = name;
  renderSidebar();

  const main = document.getElementById('main');
  main.innerHTML = '<div style="padding:20px;color:#555;">Loading...</div>';

  try {
    const res = await fetch(`sessions/${name}/session.json`);
    const data = await res.json();
    renderSession(data);
  } catch {
    main.innerHTML = '<div style="padding:20px;color:#ef4444;">Failed to load session</div>';
  }
}

function renderSession(data) {
  const main = document.getElementById('main');
  const passCount = data.tests.filter(t => t.ok).length;
  const totalDuration = (data.duration / 1000).toFixed(1);

  let html = `
    <h2>
      <span class="badge ${data.pass ? 'badge-pass' : 'badge-fail'}" style="font-size:12px;padding:2px 8px;">${data.pass ? 'PASS' : 'FAIL'}</span>
      ${data.name}
      <span style="font-size:12px;color:#555;font-weight:400;margin-left:8px;">${passCount}/${data.tests.length} tests · ${totalDuration}s</span>
    </h2>
  `;

  for (const test of data.tests) {
    html += `
      <div class="test-card">
        <div class="test-card-header">
          <span class="title">${test.ok ? '✅' : '❌'} ${test.title}</span>
          <span class="duration">${(test.duration / 1000).toFixed(1)}s</span>
        </div>
        ${test.videoFilename
          ? `<div class="video-container">
               <video controls preload="metadata" src="sessions/${data.name}/${test.videoFilename}"></video>
             </div>`
          : '<div class="no-video">No video recorded</div>'
        }
        ${test.error
          ? `<div class="error-box"><pre>${escapeHtml(test.error)}</pre></div>`
          : ''
        }
      </div>
    `;
  }

  main.innerHTML = html;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

loadSessions();
</script>

</body>
</html>
